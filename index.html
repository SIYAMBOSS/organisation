<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রিমিয়াম মেম্বার পোর্টাল</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #334155 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-style {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            transition: all 0.3s ease;
        }
        .input-style:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #38bdf8;
            outline: none;
        }
        select option { background: #1e293b; color: white; }
        .hidden-section { display: none; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="glass-card rounded-3xl w-full max-w-xl p-8 text-white m-4">
        <div id="loginForm">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-sky-400">লগইন করুন</h1>
                <p class="text-gray-400 mt-2">আপনার মোবাইল নাম্বার দিয়ে প্রবেশ করুন</p>
            </div>
            <div class="space-y-5">
                <input type="tel" placeholder="মোবাইল নাম্বার" class="input-style w-full p-4 rounded-xl text-lg">
                <button class="w-full bg-sky-500 hover:bg-sky-600 text-white py-4 rounded-xl font-bold text-lg transition duration-300 transform hover:scale-[1.02]">লগইন</button>
                <p class="text-center text-gray-400 mt-4">
                    অ্যাকাউন্ট নেই? 
                    <button onclick="toggleForms()" class="text-sky-400 font-bold hover:underline">নতুন অ্যাকাউন্ট করুন</button>
                </p>
            </div>
        </div>

        <div id="regForm" class="hidden-section">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold text-sky-400 text-left border-b border-white/10 pb-2">সদস্য আবেদন ফরম</h1>
            </div>
            <form class="space-y-4 max-h-[60vh] overflow-y-auto pr-2">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" placeholder="১. পূর্ণ নাম" class="input-style p-3 rounded-lg">
                    <input type="text" placeholder="২. পিতার নাম" class="input-style p-3 rounded-lg">
                    <input type="text" placeholder="৩. মাতার নাম" class="input-style p-3 rounded-lg">
                    <input type="tel" placeholder="৪. মোবাইল নাম্বার" class="input-style p-3 rounded-lg">
                    <input type="number" placeholder="৫. বয়স" class="input-style p-3 rounded-lg">
                    <select class="input-style p-3 rounded-lg">
                        <option value="">রক্তের গ্রুপ</option>
                        <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
                        <option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <select class="input-style p-3 rounded-lg">
                        <option>পারিবারিক সম্পর্ক</option>
                        <option>বিবাহিত</option><option>অবিবাহিত</option>
                    </select>
                    <select class="input-style p-3 rounded-lg">
                        <option>৬. পেশা</option>
                        <option>ছাত্র</option><option>ব্যবসায়ী</option><option>চাকরিজীবী</option><option>অন্যান্য</option>
                    </select>
                </div>

                <div class="space-y-4 p-4 bg-white/5 rounded-xl">
                    <p class="text-sm font-bold text-sky-300">ঠিকানা ডিটেইলস</p>
                    <div class="grid grid-cols-2 gap-3">
                        <select id="division" class="input-style p-2 rounded-md text-sm"><option>বিভাগ</option></select>
                        <select id="district" class="input-style p-2 rounded-md text-sm"><option>জেলা</option></select>
                        <select id="upazila" class="input-style p-2 rounded-md text-sm"><option>উপজেলা</option></select>
                        <select id="union" class="input-style p-2 rounded-md text-sm"><option>ইউনিয়ন</option></select>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" placeholder="১১. ওয়ার্ড" class="input-style p-2 rounded-md text-sm">
                        <input type="text" placeholder="১২. গ্রাম" class="input-style p-2 rounded-md text-sm">
                    </div>
                </div>

                <input type="number" placeholder="১৩. মাসিক সাহায্যের পরিমাণ (৳)" class="input-style w-full p-4 rounded-xl border-2 border-sky-500/30 font-bold text-center">

                <button class="w-full bg-emerald-500 hover:bg-emerald-600 py-4 rounded-xl font-bold text-lg shadow-lg">আবেদন জমা দিন</button>
            </form>
            <p class="text-center text-gray-400 mt-6">
                আগে থেকেই মেম্বার? 
                <button onclick="toggleForms()" class="text-sky-400 font-bold hover:underline">লগইন করুন</button>
            </p>
        </div>
    </div>

    <script>
        function toggleForms() {
            document.getElementById('loginForm').classList.toggle('hidden-section');
            document.getElementById('regForm').classList.toggle('hidden-section');
        }

        // ৬৪ জেলার ডাটা হ্যান্ডেল করার স্মার্ট উপায়:
        // আমরা এই API টি ব্যবহার করব: https://bdapis.com/
        // এটি ব্রাউজার লোড হওয়ার সাথে সাথে বাংলাদেশের সব ডাটা নিয়ে আসবে।
        
        async function loadGeoData() {
            // এটি একটি ডেমো ফাংশন। আসল প্রজেক্টে আমরা এখান থেকে ডাটা ফেচ করব।
            console.log("Loading Bangladesh Geo Data...");
            // ফেচিং লজিক এখানে আসবে
        }
        window.onload = loadGeoData;
    </script>
</body>
</html>
