<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আদর্শ সমাজ কল্যাণ পরিষদ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="app-header">
        <div class="header-content">
            <h1 class="org-name">আদর্শ সমাজ কল্যাণ পরিষদ</h1>
            <div class="header-actions">
                <i class="fas fa-sign-out-alt" id="logout-icon" onclick="handleLogout()"></i>
                <div class="profile-avatar" onclick="loadPage('profile')">
                    <img id="user-profile-pic" src="https://via.placeholder.com/100" alt="Profile">
                </div>
            </div>
        </div>
    </header>

    <main id="main-display">
        </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="changeTab(this, 'home')">
            <i class="fas fa-home"></i>
            <span>হোম</span>
        </div>
        <div class="nav-item" onclick="changeTab(this, 'events')">
            <i class="fas fa-calendar-check"></i>
            <span>ইভেন্ট</span>
        </div>
        <div class="nav-item" onclick="changeTab(this, 'accounts')">
            <i class="fas fa-chart-line"></i>
            <span>হিসাব</span>
        </div>
        <div class="nav-item" onclick="changeTab(this, 'help')">
            <i class="fas fa-hand-holding-heart"></i>
            <span>সাহায্য</span>
        </div>
    </nav>

    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
