<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রিমিয়াম মেম্বার পোর্টাল</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: screen;
        }
        /* Glassmorphism Effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        .input-glass {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
        }
        .input-glass option { background: #764ba2; color: white; }
        .tab-active { border-bottom: 4px solid #fff; color: white; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }
    </style>
</head>
<body class="flex items-center justify-center p-4 py-10">

    <div class="glass-card rounded-3xl w-full max-w-3xl overflow-hidden text-white">
        <div class="flex border-b border-white/20 text-center cursor-pointer">
            <div id="loginTab" class="w-1/2 py-5 font-bold tab-active transition-all" onclick="showTab('login')">লগইন</div>
            <div id="regTab" class="w-1/2 py-5 font-bold text-white/50 transition-all" onclick="showTab('reg')">নতুন মেম্বার</div>
        </div>

        <div id="loginSection" class="p-10 space-y-6">
            <div class="text-center">
                <h1 class="text-3xl font-bold">স্বাগতম!</h1>
                <p class="text-white/70">আপনার নম্বর দিয়ে ড্যাশবোর্ডে প্রবেশ করুন</p>
            </div>
            <div class="max-w-sm mx-auto space-y-4">
                <input type="tel" placeholder="মোবাইল নাম্বার" class="input-glass w-full p-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-white/50">
                <button class="w-full bg-white text-purple-700 py-4 rounded-xl font-bold text-lg hover:bg-opacity-90 transition transform hover:scale-105 active:scale-95 shadow-lg">প্রবেশ করুন</button>
            </div>
        </div>

        <div id="regSection" class="p-8 hidden max-h-[80vh] overflow-y-auto">
            <form id="regForm" class="space-y-6">
                <h2 class="text-2xl font-bold border-b border-white/20 pb-2">ব্যক্তিগত তথ্য</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" placeholder="১. পূর্ণ নাম" class="input-glass p-3 rounded-lg outline-none">
                    <input type="text" placeholder="২. পিতার নাম" class="input-glass p-3 rounded-lg outline-none">
                    <input type="text" placeholder="৩. মাতার নাম" class="input-glass p-3 rounded-lg outline-none">
                    <input type="tel" placeholder="৪. মোবাইল নাম্বার" class="input-glass p-3 rounded-lg outline-none">
                    <input type="number" placeholder="৫. বয়স" class="input-glass p-3 rounded-lg outline-none">
                    <select class="input-glass p-3 rounded-lg outline-none">
                        <option value="">রক্তের গ্রুপ</option>
                        <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
                        <option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
                    </select>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <select class="input-glass p-3 rounded-lg outline-none">
                        <option>পারিবারিক সম্পর্ক</option>
                        <option>বিবাহিত</option><option>অবিবাহিত</option>
                    </select>
                    <select class="input-glass p-3 rounded-lg outline-none">
                        <option>৬. পেশা</option>
                        <option>ছাত্র</option><option>ব্যবসায়ী</option><option>চাকরিজীবী</option><option>অন্যান্য</option>
                    </select>
                    <input type="number" placeholder="১৩. মাসিক সাহায্য (৳)" class="input-glass p-3 rounded-lg outline-none border-2 border-yellow-400/50">
                </div>

                <h2 class="text-2xl font-bold border-b border-white/20 pb-2 mt-6">ঠিকানা (নিখুঁত ডাটা)</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <select id="division" class="input-glass p-3 rounded-lg outline-none" onchange="updateDistricts()">
                        <option value="">বিভাগ সিলেক্ট করুন</option>
                        <option value="Rangpur">রংপুর</option>
                        <option value="Dhaka">ঢাকা</option>
                        </select>
                    <select id="district" class="input-glass p-3 rounded-lg outline-none" onchange="updateUpazilas()">
                        <option value="">জেলা সিলেক্ট করুন</option>
                    </select>
                    <select id="upazila" class="input-glass p-3 rounded-lg outline-none" onchange="updateUnions()">
                        <option value="">উপজেলা সিলেক্ট করুন</option>
                    </select>
                    <select id="union" class="input-glass p-3 rounded-lg outline-none">
                        <option value="">ইউনিয়ন সিলেক্ট করুন</option>
                    </select>
                    <input type="text" placeholder="১১. ওয়ার্ড নম্বর" class="input-glass p-3 rounded-lg outline-none">
                    <input type="text" placeholder="১২. গ্রাম/মহল্লা" class="input-glass p-3 rounded-lg outline-none">
                </div>

                <button type="submit" class="w-full bg-green-500 text-white py-4 rounded-xl font-bold text-lg mt-6 hover:bg-green-600 shadow-xl transition transform hover:scale-105">রেজিস্ট্রেশন নিশ্চিত করুন</button>
            </form>
        </div>
    </div>

    <script>
        // Tab Switcher
        function showTab(tab) {
            if(tab === 'login') {
                document.getElementById('loginSection').classList.remove('hidden');
                document.getElementById('regSection').classList.add('hidden');
                document.getElementById('loginTab').classList.add('tab-active');
                document.getElementById('regTab').classList.remove('tab-active');
                document.getElementById('regTab').classList.add('text-white/50');
            } else {
                document.getElementById('regSection').classList.remove('hidden');
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('regTab').classList.add('tab-active');
                document.getElementById('loginTab').classList.remove('tab-active');
                document.getElementById('loginTab').classList.add('text-white/50');
            }
        }

        // Data Structure for 64 Districts, Upazilas, and Unions
        // এখানে আমি ডেমো ডাটা দিচ্ছি, পূর্ণাঙ্গ ডাটাবেস অনেক বড় হবে যা Firebase থেকে লোড করা ভালো
        const geoData = {
            "Rangpur": {
                "Rangpur-Dist": {
                    "Badarganj": ["Kalupara", "Lohani Para", "Gopalpur", "Radhanagar"],
                    "Pirganj": ["Pirganj Union", "Raypur", "Chatra"],
                },
                "Dinajpur": {
                    "Birampur": ["Birampur Union", "Dhamoir"],
                }
            },
            "Dhaka": {
                "Gazipur": {
                    "Sreepur": ["Maona", "Telihati"],
                }
            }
        };

        function updateDistricts() {
            const div = document.getElementById('division').value;
            const distSelect = document.getElementById('district');
            distSelect.innerHTML = '<option>জেলা সিলেক্ট করুন</option>';
            if(div) {
                Object.keys(geoData[div]).forEach(dist => {
                    distSelect.innerHTML += `<option value="${dist}">${dist}</option>`;
                });
            }
        }

        function updateUpazilas() {
            const div = document.getElementById('division').value;
            const dist = document.getElementById('district').value;
            const upzSelect = document.getElementById('upazila');
            upzSelect.innerHTML = '<option>উপজেলা সিলেক্ট করুন</option>';
            if(dist) {
                Object.keys(geoData[div][dist]).forEach(upz => {
                    upzSelect.innerHTML += `<option value="${upz}">${upz}</option>`;
                });
            }
        }

        function updateUnions() {
            const div = document.getElementById('division').value;
            const dist = document.getElementById('district').value;
            const upz = document.getElementById('upazila').value;
            const unionSelect = document.getElementById('union');
            unionSelect.innerHTML = '<option>ইউনিয়ন সিলেক্ট করুন</option>';
            if(upz) {
                geoData[div][dist][upz].forEach(uni => {
                    unionSelect.innerHTML += `<option value="${uni}">${uni}</option>`;
                });
            }
        }
    </script>
</body>
</html>
